name: Build & Release APK

on:
  push:
    branches: ["**"]
  workflow_dispatch:

# Needed to create/update the GitHub Release.
permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the commit count is a real version

      # Version from the commit count, not the CI run number. The run number
      # can come out of order when builds race (a later push cancelling an
      # earlier one), which once published an older commit under a higher
      # version. The commit count is strictly monotonic with history, so a
      # later commit always gets a higher version.
      - name: Compute version
        id: ver
        run: echo "code=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build debug APK
        env:
          # Monotonic version so each build installs as an update.
          VERSION_CODE: ${{ steps.ver.outputs.code }}
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: Stage APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk sidebar-latest.apk

      # Each build gets a real, incrementing version tag (v1.0.<run>) and is
      # marked as the GitHub "latest" release. Obtainium reads the tag as the
      # version, so it sees a genuine version that climbs every build and can
      # detect updates. The stable download URL still works because
      # releases/latest/download/... follows the "latest" flag, not the tag.
      - name: Publish versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ steps.ver.outputs.code }}
          name: v1.0.${{ steps.ver.outputs.code }}
          body: |
            Automated build from commit ${{ github.sha }}
            (versionName 1.0.${{ steps.ver.outputs.code }}, versionCode ${{ steps.ver.outputs.code }}).
            Install/update via Obtainium.
          files: sidebar-latest.apk
          make_latest: true
          target_commitish: ${{ github.sha }}
