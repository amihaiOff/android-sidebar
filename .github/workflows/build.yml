name: Build & Release APK

on:
  push:
    branches: ["**"]
  workflow_dispatch:

# Needed to create/update the GitHub Release.
permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build debug APK
        env:
          # Monotonic version so each build installs as an update.
          VERSION_CODE: ${{ github.run_number }}
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: Stage APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk sidebar-latest.apk

      - name: Publish to 'latest' release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: |
            Rolling debug build from commit ${{ github.sha }}.
            versionCode ${{ github.run_number }}. Install via Obtainium.
          files: sidebar-latest.apk
          make_latest: true
          # Move the `latest` tag to this commit each run.
          target_commitish: ${{ github.sha }}
